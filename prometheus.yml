global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'scrub'
    metrics_path: /metrics
    static_configs:
      # Use host.docker.internal to reach your app on port 3000
      - targets: ['host.docker.internal:3000']
