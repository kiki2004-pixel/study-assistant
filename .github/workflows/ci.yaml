name: Ruff

on:
  pull_request:
    branches:
      - main

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Official Ruff GitHub Action
      - uses: astral-sh/ruff-action@v3
        with:
          version: '0.14.5'
          args: check --output-format=github api/