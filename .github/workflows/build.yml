name: Build and deploy

on:
  push:
    branches:
      - main
      - prod
    paths:
      - "VERSIONS"
      - ".github/workflows/build.yml"
  workflow_dispatch:
    inputs:
      component:
        description: "Component to build (api, web, or both)"
        required: true
        default: "both"
        type: choice
        options:
          - api
          - web
          - both

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      api_changed: ${{ steps.out.outputs.api_changed }}
      web_changed: ${{ steps.out.outputs.web_changed }}
      api_tag: ${{ steps.out.outputs.api_tag }}
      web_tag: ${{ steps.out.outputs.web_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute outputs
        id: out
        run: |
          BRANCH="${{ github.ref_name }}"
          EVENT="${{ github.event_name }}"
          api_changed=false
          web_changed=false

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            INPUT="${{ inputs.component }}"
            [[ "$INPUT" == "api" || "$INPUT" == "both" ]] && api_changed=true
            [[ "$INPUT" == "web" || "$INPUT" == "both" ]] && web_changed=true
          elif [[ "$EVENT" == "pull_request" ]]; then
            # PR to prod — build both
            api_changed=true
            web_changed=true
          elif [[ "$BRANCH" == "main" ]]; then
            # Triggered by VERSIONS change — detect which component version changed
            VDIFF=$(git diff HEAD~1 HEAD -- VERSIONS)
            echo "$VDIFF" | grep -q '^+api=' && api_changed=true
            echo "$VDIFF" | grep -q '^+web=' && web_changed=true
          elif [[ "$BRANCH" == "prod" ]]; then
            # VERSIONS updated on prod — build both
            api_changed=true
            web_changed=true
          fi

          # Read versions and compute tags
          API_VERSION=$(grep '^api=' VERSIONS | cut -d= -f2)
          WEB_VERSION=$(grep '^web=' VERSIONS | cut -d= -f2)

          if [[ "$BRANCH" == "main" ]]; then
            echo "api_tag=${API_VERSION}-alpha" >> "$GITHUB_OUTPUT"
            echo "web_tag=${WEB_VERSION}-alpha" >> "$GITHUB_OUTPUT"
          else
            echo "api_tag=${API_VERSION}" >> "$GITHUB_OUTPUT"
            echo "web_tag=${WEB_VERSION}" >> "$GITHUB_OUTPUT"
          fi

          echo "api_changed=${api_changed}" >> "$GITHUB_OUTPUT"
          echo "web_changed=${web_changed}" >> "$GITHUB_OUTPUT"

  build-api:
    needs: detect
    if: needs.detect.outputs.api_changed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: api/
          push: true
          tags: ghcr.io/nerd-zero/scrub-api:${{ needs.detect.outputs.api_tag }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            APP_VERSION=${{ needs.detect.outputs.api_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    needs: detect
    if: needs.detect.outputs.web_changed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: web/
          push: true
          tags: ghcr.io/nerd-zero/scrub:${{ needs.detect.outputs.web_tag }}
          build-args: |
            VITE_OIDC_AUTHORITY=${{ secrets.VITE_OIDC_AUTHORITY }}
            VITE_OIDC_CLIENT_ID=${{ secrets.VITE_OIDC_CLIENT_ID }}
            VITE_OIDC_REDIRECT_URI=${{ secrets.VITE_OIDC_REDIRECT_URI }}
            VITE_OIDC_POST_LOGOUT_REDIRECT_URI=${{ secrets.VITE_OIDC_POST_LOGOUT_REDIRECT_URI }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
