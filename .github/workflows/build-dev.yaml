name: Build and deploy

on:
  push:
    branches:
      - main
      - uat
      - prod
  pull_request:
    branches:
      - main
      - uat
      - prod

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.filter.outputs.api == 'true' || steps.filter.outputs.web == 'true' }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ""
          filters: |
            api:
              - 'src/**'
            web:
              - 'web/**'

  prepare:
    needs: changes
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_variables.outputs.APP_VERSION }}
      api_image: ${{ steps.set_variables.outputs.API_IMAGE }}
      web_image: ${{ steps.set_variables.outputs.WEB_IMAGE }}
      environment: ${{ steps.set_variables.outputs.ENVIRONMENT }}
      build_env: ${{ steps.set_variables.outputs.BUILD_ENV }}
      deploy_url: ${{ steps.set_variables.outputs.DEPLOY_URL }}
      vite_oidc_authority: ${{ steps.set_variables.outputs.VITE_OIDC_AUTHORITY }}
      vite_oidc_redirect_uri: ${{ steps.set_variables.outputs.VITE_OIDC_REDIRECT_URI }}
      vite_oidc_post_logout_redirect_uri: ${{ steps.set_variables.outputs.VITE_OIDC_POST_LOGOUT_REDIRECT_URI }}
    steps:
      - uses: actions/checkout@v4

      - id: set_variables
        name: Set variables
        run: |
          VER=$(python version.py)
          BRANCH="${{ github.ref_name }}"
          BASE="${{ github.base_ref }}"

          if [[ "$BRANCH" == "prod" || "$BASE" == "prod" ]]; then
            TAG="$VER"
            ENV="Production"
            BUILD_ENV="prod"
            APP_URL="https://thescrub.app"
            OIDC_REALM="scrub"
          elif [[ "$BRANCH" == "uat" || "$BASE" == "uat" ]]; then
            TAG="${VER}-beta"
            ENV="UAT"
            BUILD_ENV="uat"
            APP_URL="https://uat.thescrub.app"
            OIDC_REALM="scrub-uat"
          else
            TAG="${VER}-alpha"
            ENV="Development"
            BUILD_ENV="dev"
            APP_URL="https://dev.thescrub.app"
            OIDC_REALM="scrub-dev"
          fi

          echo "APP_VERSION=${TAG}" >> $GITHUB_OUTPUT
          echo "API_IMAGE=ghcr.io/nerd-zero/scrub:${TAG}" >> $GITHUB_OUTPUT
          echo "WEB_IMAGE=ghcr.io/nerd-zero/scrub-web:${TAG}" >> $GITHUB_OUTPUT
          echo "ENVIRONMENT=${ENV}" >> $GITHUB_OUTPUT
          echo "BUILD_ENV=${BUILD_ENV}" >> $GITHUB_OUTPUT
          echo "DEPLOY_URL=${APP_URL}" >> $GITHUB_OUTPUT
          echo "VITE_OIDC_AUTHORITY=https://auth.n0.rocks/realms/${OIDC_REALM}" >> $GITHUB_OUTPUT
          echo "VITE_OIDC_REDIRECT_URI=${APP_URL}/auth/callback" >> $GITHUB_OUTPUT
          echo "VITE_OIDC_POST_LOGOUT_REDIRECT_URI=${APP_URL}" >> $GITHUB_OUTPUT

  verify_build:
    if: github.event_name == 'pull_request'
    needs: [changes, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Verify API image tag doesn't exist
        if: needs.changes.outputs.api == 'true'
        env:
          DOCKER_USERNAME: ${{ github.actor }}
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          skopeo login --username "$DOCKER_USERNAME" --password "$DOCKER_PASSWORD" ghcr.io
          if skopeo inspect docker://${{ needs.prepare.outputs.api_image }} > /dev/null 2>&1; then
            echo "Image ${{ needs.prepare.outputs.api_image }} already exists. Pipeline will fail."
            exit 1
          else
            echo "Image tag is available, continue."
          fi

      - name: Verify web image tag doesn't exist
        if: needs.changes.outputs.web == 'true'
        env:
          DOCKER_USERNAME: ${{ github.actor }}
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          skopeo login --username "$DOCKER_USERNAME" --password "$DOCKER_PASSWORD" ghcr.io
          if skopeo inspect docker://${{ needs.prepare.outputs.web_image }} > /dev/null 2>&1; then
            echo "Image ${{ needs.prepare.outputs.web_image }} already exists. Pipeline will fail."
            exit 1
          else
            echo "Image tag is available, continue."
          fi

  deploy:
    needs: [changes, prepare]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment:
      name: ${{ needs.prepare.outputs.environment }}
      url: ${{ needs.prepare.outputs.deploy_url }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        if: needs.changes.outputs.api == 'true'
        run: |
          docker build . \
            --build-arg "BUILD_ENV=${{ needs.prepare.outputs.build_env }}" \
            --build-arg "GIT_COMMIT=${{ github.sha }}" \
            --build-arg "APP_VERSION=${{ needs.prepare.outputs.version }}" \
            --tag "${{ needs.prepare.outputs.api_image }}"

      - name: Build web image
        if: needs.changes.outputs.web == 'true'
        run: |
          docker build web/ \
            --build-arg "VITE_OIDC_AUTHORITY=${{ needs.prepare.outputs.vite_oidc_authority }}" \
            --build-arg "VITE_OIDC_CLIENT_ID=app" \
            --build-arg "VITE_OIDC_REDIRECT_URI=${{ needs.prepare.outputs.vite_oidc_redirect_uri }}" \
            --build-arg "VITE_OIDC_POST_LOGOUT_REDIRECT_URI=${{ needs.prepare.outputs.vite_oidc_post_logout_redirect_uri }}" \
            --tag "${{ needs.prepare.outputs.web_image }}"

      - name: Push API image
        if: needs.changes.outputs.api == 'true'
        run: docker push ${{ needs.prepare.outputs.api_image }}

      - name: Push web image
        if: needs.changes.outputs.web == 'true'
        run: docker push ${{ needs.prepare.outputs.web_image }}
