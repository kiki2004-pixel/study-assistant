name: E2E Scrub Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Editable install
          pip install -e .
          # Testing tools
          pip install pytest pytest-asyncio pytest-mock respx httpx

      - name: Run E2E Tests
        env:
          LISTMONK_URL: "http://localhost:9000"
          LISTMONK_USER: "admin"
          LISTMONK_PASS: "test_key"
          POSTMARK_WEBHOOK_SECRET: "test_secret"
        run: |
          pytest e2e_tests/test_validation_flow.py