services:
  scrub:
    build: api
    env_file:
      - api/.env
    ports:
      - "3000:3000"
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      - AGENT_NAME=scrub
      - LISTMONK_URL=${LISTMONK_URL:-}
      - LISTMONK_USER=${LISTMONK_USER:-}
      - LISTMONK_PASS=${LISTMONK_PASS:-}
      - LISTMONK_LIST_ID=${LISTMONK_LIST_ID:-1}
      - LISTMONK_EXCLUDE_NAME_SUBSTRINGS=${LISTMONK_EXCLUDE_NAME_SUBSTRINGS:-}
      - SCRUB_DB_URL=${SCRUB_DB_URL:-postgresql+psycopg2://scrub:scrub@scrub_db:5432/scrub}
      - API_KEY=${API_KEY:-local-dev-api-key}
      - ZITADEL_DOMAIN=${ZITADEL_DOMAIN:-http://zitadel:8080}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    restart: unless-stopped
    depends_on:
      - listmonk_app
      - redis
      - scrub_db

  redis:
    image: redis:latest
    container_name: scrub_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery-worker:
    build: api
    env_file:
      - api/.env
    depends_on:
      - redis
      - listmonk_app
      - scrub_db
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      - C_FORCE_ROOT=true
      - LISTMONK_URL=http://listmonk:9000
      - LISTMONK_USER=${LISTMONK_USER:-}
      - LISTMONK_PASS=${LISTMONK_PASS:-}
      - LISTMONK_LIST_ID=${LISTMONK_LIST_ID:-}
      - LISTMONK_EXCLUDE_NAME_SUBSTRINGS=${LISTMONK_EXCLUDE_NAME_SUBSTRINGS:-}
      - VALIDATION_BATCH_SIZE=${VALIDATION_BATCH_SIZE:-250}
      - VALIDATION_POLL_INTERVAL_SECONDS=${VALIDATION_POLL_INTERVAL_SECONDS:-60}
      - SCRUB_DB_URL=postgresql+psycopg2://scrub:scrub@scrub_db:5432/scrub
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command:
      [
        "/app/.venv/bin/python",
        "-m",
        "celery",
        "-A",
        "scrub.jobs.celery_app",
        "worker",
        "--loglevel=info",
      ]
    restart: unless-stopped

  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.63.5
    container_name: zitadel
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
    restart: unless-stopped
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: zitadel-admin@zitadel.localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: Password1!
    ports:
      - "8080:8080"
    depends_on:
      zitadel-db:
        condition: service_healthy

  zitadel-db:
    container_name: zitadel-db
    image: postgres:17
    restart: unless-stopped
    expose:
      - 5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zitadel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - zitadel-db:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus # Moved to data subfolder
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    ports:
      - "3001:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana # Moved to data subfolder
    restart: unless-stopped

  listmonk_app:
    image: listmonk/listmonk:latest
    container_name: listmonk_app
    restart: unless-stopped
    ports:
      - "9000:9000"
    depends_on:
      - listmonk_db
    command:
      [
        "sh",
        "-c",
        "./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''",
      ]
    environment:
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_db__user: listmonk
      LISTMONK_db__password: listmonk
      LISTMONK_db__database: listmonk
      LISTMONK_db__host: listmonk_db
      LISTMONK_db__port: 5432
      LISTMONK_db__ssl_mode: disable
      LISTMONK_db__max_open: 25
      LISTMONK_db__max_idle: 25
      LISTMONK_db__max_lifetime: 300s
      TZ: Etc/UTC
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-}
    volumes:
      - ./data/listmonk/uploads:/listmonk/uploads:rw
    networks:
      default:
        aliases:
          - listmonk

  scrub_db:
    image: postgres:17-alpine
    container_name: scrub_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: scrub
      POSTGRES_PASSWORD: scrub
      POSTGRES_DB: scrub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrub"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - scrub-db:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  listmonk_db:
    image: postgres:17-alpine
    container_name: listmonk_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: listmonk
      POSTGRES_PASSWORD: listmonk
      POSTGRES_DB: listmonk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - ./data/listmonk/db:/var/lib/postgresql/data

volumes:
  zitadel-db:
  scrub-db:
