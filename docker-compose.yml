

services:
  mail-validation-service:
    build: .
    image: pixel/mail-validation-service:latest
    ports:
      - "3000:3000"
    environment:
      - LISTMONK_URL=${LISTMONK_URL:-}
      - LISTMONK_PASS=${LISTMONK_PASS:-}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - AGENT_NAME=mail-validation-service
    restart: unless-stopped
    depends_on:
      - listmonk_app
      - redis

  redis:
    image: redis:latest
    container_name: mail_validation_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery-worker:
    build: .
    image: pixel/mail-validation-service:latest
    depends_on:
      - redis
    environment:
      - PYTHONPATH=/app/src
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    command: ["/app/.venv/bin/python", "-m", "celery", "-A", "mail_validation.jobs.listmonk_validator.celery_app", "worker", "--loglevel=info"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus  # Moved to data subfolder
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    ports:
      - "3001:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana # Moved to data subfolder
    restart: unless-stopped

  listmonk_app:
    image: listmonk/listmonk:latest
    container_name: listmonk_app
    restart: unless-stopped
    ports:
      - "9000:9000"
    depends_on:
      - listmonk_db
    command:
      [
        "sh",
        "-c",
        "./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''",
      ]
    environment:
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_db__user: listmonk
      LISTMONK_db__password: listmonk
      LISTMONK_db__database: listmonk
      LISTMONK_db__host: listmonk_db
      LISTMONK_db__port: 5432
      LISTMONK_db__ssl_mode: disable
      LISTMONK_db__max_open: 25
      LISTMONK_db__max_idle: 25
      LISTMONK_db__max_lifetime: 300s
      TZ: Etc/UTC
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-}
    volumes:
      - ./data/listmonk/uploads:/listmonk/uploads:rw
    networks:
      default:
        aliases:
          - listmonk

  listmonk_db:
    image: postgres:17-alpine
    container_name: listmonk_db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: listmonk
      POSTGRES_PASSWORD: listmonk
      POSTGRES_DB: listmonk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - ./data/listmonk/db:/var/lib/postgresql/data

  listmonk-validator:
    build: .
    image: pixel/mail-validation-service:latest
    depends_on:
      - listmonk_app
      - redis
    environment:
      - PYTHONPATH=/app/src
      - LISTMONK_BASE_URL=http://listmonk:9000
      - LISTMONK_API_USER=${LISTMONK_API_USER:-}
      - LISTMONK_API_TOKEN=${LISTMONK_API_TOKEN:-}
      - LISTMONK_LIST_ID=${LISTMONK_LIST_ID:-}
      - LISTMONK_EXCLUDE_NAME_SUBSTRINGS=${LISTMONK_EXCLUDE_NAME_SUBSTRINGS:-}
      - VALIDATION_BATCH_SIZE=${VALIDATION_BATCH_SIZE:-}
      - VALIDATION_POLL_INTERVAL_SECONDS=${VALIDATION_POLL_INTERVAL_SECONDS:-}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - WATERMARK_DB_URL=postgresql+psycopg2://listmonk:listmonk@listmonk_db:5432/listmonk
    command: ["/app/.venv/bin/python", "-m", "mail_validation.jobs.listmonk_validator"]
    restart: unless-stopped
