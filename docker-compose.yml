

services:
  mail-validation-service:
    build: .
    image: pixel/mail-validation-service:latest
    ports:
      - "3000:3000"
    environment:
      - LISTMONK_URL=${LISTMONK_URL}
      - LISTMONK_PASS=${LISTMONK_PASS}
      - MAILS_SO_API_KEY=${MAILS_SO_API_KEY}
      - POSTMARK_WEBHOOK_SECRET=${POSTMARK_WEBHOOK_SECRET}
      - AGENT_NAME=mail-validation-service
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus  # Moved to data subfolder
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    ports:
      - "3001:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana # Moved to data subfolder
    restart: unless-stopped

